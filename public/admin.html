<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Arte Crochet</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#fff1f5,#ffe4ec);
}

header{
    background: linear-gradient(135deg,#ff7aa2,#ffb3c6);
    color:white;
    padding:25px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.logout-btn{
    width:auto;
    padding:10px 20px;
    background:#ff4d6d;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    display:block;
    margin:15px auto;
}

.container{
    max-width:500px;
    margin:20px auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background: linear-gradient(135deg,#25D366,#128C7E);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.lista{
    max-width:900px;
    margin:30px auto;
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.actions button{
    flex:1;
    padding:8px;
    font-size:12px;
}

.edit{background:#007bff;}
.delete{background:#ff4d6d;}

.mensaje{
    text-align:center;
    margin-top:10px;
    color:#ff4d6d;
}
</style>
</head>

<body>

<header>⚙️ Panel Administrador</header>

<button onclick="logout()" class="logout-btn">Cerrar sesión</button>

<div class="container">
<h3>Agregar Producto 🧶</h3>

<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">
<input id="cantidad" placeholder="Cantidad">

<input type="file" id="imagen">
<img id="preview" style="width:100%;display:none;margin-top:10px;border-radius:10px;">

<button onclick="guardar()">Guardar</button>
<div id="msg" class="mensaje"></div>
</div>

<h3 style="text-align:center;">📦 Productos</h3>
<div id="lista" class="lista"></div>

<script>

/* LOGIN */
if(localStorage.getItem("ismari") !== "1326"){
    window.location.href="login.html";
}

function logout(){
    localStorage.removeItem("ismari");
    window.location.href="login.html";
}

/* PREVIEW */
imagen.onchange = ()=>{
    const file = imagen.files[0];
    const reader = new FileReader();

    reader.onload = e=>{
        preview.src = e.target.result;
        preview.style.display="block";
    }

    reader.readAsDataURL(file);
}

/* GUARDAR */
function guardar(){
    const formData = new FormData();

    formData.append("nombre", nombre.value);
    formData.append("precio", precio.value);
    formData.append("cantidad", cantidad.value);
    formData.append("imagen", imagen.files[0]);

    fetch("https://tienda-crochet-dtlk.onrender.com/productos",{
        method:"POST",
        body:formData
    })
    .then(()=> {
        msg.innerText="✅ Guardado";

        nombre.value="";
        precio.value="";
        cantidad.value="";
        imagen.value="";
        preview.style.display="none";

        cargarProductos(); // 🔥 CLAVE
    });
}

/* CARGAR PRODUCTOS */
function cargarProductos(){

fetch("https://tienda-crochet-dtlk.onrender.com/productos")
.then(res=>res.json())
.then(data=>{

    const contenedor = document.getElementById("lista"); // 🔥 CORREGIDO
    contenedor.innerHTML = "";

    data.forEach(p => {

        contenedor.innerHTML += `
        <div class="card">
            <img src="${p.imagen}">
            <h4>${p.nombre}</h4>
            <p>${p.precio}</p>
            <p>Stock: ${p.cantidad}</p>

            <div class="actions">
                <button class="edit" onclick="editar(${p.id})">Editar</button>
                <button class="delete" onclick="eliminar(${p.id})">Eliminar</button>
            </div>
        </div>
        `;
    });

});
}

/* ELIMINAR */
function eliminar(id){
    if(confirm("Eliminar producto?")){
        fetch(`https://tienda-crochet-dtlk.onrender.com/productos/${id}`,{
            method:"DELETE"
        })
        .then(()=>cargarProductos());
    }
}

/* EDITAR */
function editar(id){
    const nuevoNombre = prompt("Nuevo nombre:");
    const nuevoPrecio = prompt("Nuevo precio:");
    const nuevaCantidad = prompt("Cantidad:");

    fetch(`https://tienda-crochet-dtlk.onrender.com/productos/${id}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            nombre:nuevoNombre,
            precio:nuevoPrecio,
            cantidad:nuevaCantidad
        })
    })
    .then(()=>cargarProductos());
}

/* INICIAR */
cargarProductos(); // 🔥 CORRECTO

</script>

</body>
</html>
