<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arte Crochet</title>

<style>

/* ===== ANIMACIÓN FONDO ===== */
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg,#fff1f5,#ffe4ec,#fff0f5,#ffe8f0);
    background-size: 400% 400%;
    animation: fondoAnim 12s ease infinite;
}

@keyframes fondoAnim{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* NAVBAR */
.navbar{
    position:sticky;
    top:0;
    background:rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    padding:15px;
    text-align:center;
    font-weight:bold;
    color:#ff4d6d;
    font-size:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* HERO */
header{
    text-align:center;
    padding:60px 20px;
    color:white;
    background: linear-gradient(135deg,#ff7aa2,#ffb3c6);
}

header h1{
    margin-bottom:15px;
}

.search input{
    width:300px;
    padding:12px;
    border:none;
    border-radius:30px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    outline:none;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    padding:30px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
    transition:0.4s;
    position:relative;
}

.card:hover{
    transform: translateY(-10px) scale(1.02);
    box-shadow:0 25px 50px rgba(0,0,0,0.12);
}

/* BORDE PREMIUM */
.card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:25px;
    padding:1px;
    background: linear-gradient(135deg,#ff7aa2,#ffb3c6);
    -webkit-mask:
        linear-gradient(#fff 0 0) content-box, 
        linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
}

/* IMAGEN */
.img-container{
    height:300px;
    display:flex;
    align-items:center;
    justify-content:center;
    background: linear-gradient(135deg,#fff0f5,#ffe4ec);
    padding:10px;
}

.img-container img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    transition:0.4s;
    border-radius:15px;
}

.card:hover img{
    transform:scale(1.08);
}

/* BADGE */
.badge{
    position:absolute;
    top:10px;
    right:10px;
    padding:5px 10px;
    border-radius:10px;
    font-size:12px;
    color:white;
    font-weight:bold;
}

/* CONTENIDO */
.card-content{
    padding:20px;
}

.price{
    color:#ff4d6d;
    font-size:22px;
    font-weight:bold;
    margin-top:5px;
}

/* BOTÓN */
.btn{
    display:block;
    text-align:center;
    margin-top:12px;
    padding:12px;
    border-radius:12px;
    background: linear-gradient(135deg,#25D366,#128C7E);
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* MODAL */
.modal{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal img{
    max-width:90%;
    max-height:90%;
}

/* LOADER */
.loader{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    font-size:20px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="loader" id="loader">🧶 Cargando tienda...</div>

<div class="navbar">🧶 Arte Crochet Ismari Pérez</div>

<header>
<h1>Hecho a mano con amor 💖</h1>
<div class="search">
<input type="text" id="buscador" placeholder="Buscar productos...">
</div>
</header>

<div class="container" id="productos"></div>

<div class="modal" id="modal" onclick="cerrarModal()">
<img id="imgModal">
</div>

<a class="whatsapp" href="https://wa.me/573027511479" target="_blank">💬</a>

<script>

let productosGlobal=[];

fetch("https://tienda-crochet-dtlk.onrender.com/productos")
.then(res=>res.json())
.then(data=>{
    productosGlobal=data;
    mostrar(data);
    loader.classList.add("hidden");
});

function mostrar(data){
    const contenedor=document.getElementById("productos");
    contenedor.innerHTML="";

    data.forEach(p=>{

        const mensaje = encodeURIComponent(
        `Hola, me gustó el producto "${p.nombre}" que cuesta $${p.precio}. ¿Me puedes dar más información?`
        );

        contenedor.innerHTML+=`
        <div class="card">

            <div class="img-container">
                <img src="${p.imagen}" onclick="verImagen('${p.imagen}')">

                <div class="badge" style="background:${p.cantidad > 0 ? '#25D366' : '#ff4d6d'}">
                    ${p.cantidad > 0 ? 'Disponible' : 'Agotado'}
                </div>
            </div>

            <div class="card-content">
                <h3>${p.nombre}</h3>
                <div class="price">$${p.precio}</div>

                <a class="btn" 
                href="https://wa.me/573146679536?text=${mensaje}" 
                target="_blank">
                🛍️ Comprar ahora
                </a>
            </div>

        </div>`;
    });
}

buscador.addEventListener("input",()=>{
    const v=buscador.value.toLowerCase();
    mostrar(productosGlobal.filter(p=>p.nombre.toLowerCase().includes(v)));
});

function verImagen(img){
    modal.style.display="flex";
    imgModal.src=img;
}

function cerrarModal(){
    modal.style.display="none";
}

</script>

</body>
</html>
