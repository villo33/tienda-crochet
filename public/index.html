<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arte Crochet</title>

<style>

/* ===== FONDO ANIMADO SUAVE ===== */
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg,#fff1f5,#ffe4ec,#fff0f5,#ffe8f0);
    background-size: 400% 400%;
    animation: fondoAnim 15s ease infinite;
}

@keyframes fondoAnim{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ===== NAVBAR ===== */
.navbar{
    position:sticky;
    top:0;
    background:rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding:15px;
    text-align:center;
    font-weight:bold;
    color:#ff4d6d;
    font-size:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* ===== HERO ===== */
header{
    text-align:center;
    padding:60px 20px;
    color:white;
    background: linear-gradient(135deg,#ff7aa2,#ffb3c6);
}

header h1{
    margin-bottom:15px;
    font-size:28px;
}

/* ===== BUSCADOR ===== */
.search input{
    width:300px;
    max-width:90%;
    padding:12px;
    border:none;
    border-radius:30px;
    outline:none;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* ===== GRID ===== */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(270px,1fr));
    gap:30px;
    padding:30px;
}

/* ===== CARD ===== */
.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
    transition:0.4s;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.card:hover{
    transform: translateY(-8px);
}

/* ===== IMAGEN ===== */
.img-container{
    width:100%;
    height:260px;
    background: linear-gradient(135deg,#fff0f5,#ffe4ec);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px;
}

.img-container img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    transition:0.4s;
}

.card:hover img{
    transform:scale(1.05);
}

/* ===== CONTENIDO ===== */
.card-content{
    padding:20px;
}

.card-content h3{
    margin:0;
}

/* ===== PRECIO ===== */
.price{
    color:#ff4d6d;
    font-size:22px;
    font-weight:bold;
    margin-top:5px;
}

/* ===== STOCK ===== */
.stock{
    font-size:13px;
    color:#777;
    margin-top:5px;
}

/* ===== BOTÓN ===== */
.btn{
    display:block;
    text-align:center;
    margin-top:12px;
    padding:12px;
    border-radius:12px;
    background: linear-gradient(135deg,#25D366,#128C7E);
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* ===== MODAL ===== */
.modal{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}



/* ===== LOADER ===== */
.loader{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    font-size:20px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="loader" id="loader">🧶 Cargando tienda...</div>

<div class="navbar">🧶 Arte Crochet Ismari Pérez</div>

<header>
<h1>Hecho a mano con amor 💖</h1>
<div class="search">
<input type="text" id="buscador" placeholder="Buscar productos...">
</div>
</header>

<div class="container" id="productos"></div>

<div class="modal" id="modal" onclick="cerrarModal()">
<img id="imgModal">
</div>

<script>

let productosGlobal=[];

fetch("https://tienda-crochet-dtlk.onrender.com/productos")
.then(res=>res.json())
.then(data=>{
    productosGlobal=data;
    mostrar(data);
    loader.classList.add("hidden");
});

/* ===== MOSTRAR PRODUCTOS ===== */
function mostrar(data){
    const contenedor=document.getElementById("productos");
    contenedor.innerHTML="";

    if(data.length===0){
        contenedor.innerHTML="<h2 style='text-align:center'>No hay productos</h2>";
        return;
    }

    data.forEach(p=>{

        const mensaje = encodeURIComponent(
`Hola 👋, me gustó este producto:

🧶 ${p.nombre}
💰 Precio: $${p.precio}

¿Me puedes dar más información?`
        );

        contenedor.innerHTML+=`
        <div class="card">

            <div class="img-container">
                <img src="${p.imagen}" onclick="verImagen('${p.imagen}')">
            </div>

            <div class="card-content">
                <h3>${p.nombre}</h3>
                <div class="price">$${p.precio}</div>

                <div class="stock">
                    ${p.cantidad > 0 
                        ? `📦 ${p.cantidad} disponibles`
                        : `❌ Agotado`
                    }
                </div>

                <a class="btn" 
                href="https://wa.me/573146679536?text=${mensaje}" 
                target="_blank">
                💬 informacion  por WhatsApp
                </a>

            </div>

        </div>`;
    });
}

/* ===== BUSCADOR ===== */
buscador.addEventListener("input",()=>{
    const v=buscador.value.toLowerCase();
    mostrar(productosGlobal.filter(p=>p.nombre.toLowerCase().includes(v)));
});

/* ===== MODAL ===== */
function verImagen(img){
    modal.style.display="flex";
    imgModal.src=img;
}

function cerrarModal(){
    modal.style.display="none";
}

</script>

</body>
</html>
