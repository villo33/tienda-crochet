<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arte Crochet</title>

<style>
html{scroll-behavior:smooth;}

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#fff1f5,#ffe4ec);
}

/* NAVBAR */
.navbar{
    position:sticky;
    top:0;
    background:rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    z-index:100;
}

.logo{
    font-weight:bold;
    color:#ff4d6d;
    font-size:18px;
}

/* HERO */
header{
    background: linear-gradient(135deg,#ff7aa2,#ffb3c6);
    color:white;
    padding:60px 20px;
    text-align:center;
}

header h1{
    margin-bottom:15px;
    font-size:28px;
}

.search input{
    width:300px;
    padding:12px;
    border:none;
    border-radius:30px;
    outline:none;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* GRID */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
    gap:30px;
    padding:30px;
}

/* CARD PRO */
.card{
    background:rgba(255,255,255,0.9);
    backdrop-filter: blur(8px);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
    transition:0.4s;
    position:relative;
}

.card:hover{
    transform: translateY(-8px) scale(1.02);
    box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

/* CONTENEDOR IMAGEN */
.img-container{
    width:100%;
    height:320px;
    background: linear-gradient(135deg,#fff0f5,#ffe4ec);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px;
}

/* IMAGEN */
.img-container img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    transition:0.4s;
}

/* EFECTO HOVER */
.card:hover img{
    transform:scale(1.08);
}

/* CONTENIDO */
.card-content{
    padding:20px;
}

.card-content h3{
    margin:0 0 10px 0;
}

/* PRECIO */
.price{
    color:#ff4d6d;
    font-weight:bold;
    font-size:20px;
}

/* INFO */
.info{
    font-size:13px;
    color:#777;
    margin-top:5px;
}

/* BOTÓN PRO */
.btn{
    display:block;
    text-align:center;
    background: linear-gradient(135deg,#25D366,#128C7E);
    color:white;
    padding:12px;
    border-radius:12px;
    text-decoration:none;
    margin-top:12px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* MODAL */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

/* WHATSAPP FLOAT */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    font-size:20px;
    text-decoration:none;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* LOADER */
.loader{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    font-size:20px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="loader" id="loader">🧶 Cargando tienda...</div>

<div class="navbar">
<div class="logo">🧶 Arte Crochet Ismari Pérez</div>
</div>

<header>
<h1>Hecho a mano con amor 💖</h1>
<div class="search">
<input type="text" id="buscador" placeholder="Buscar productos...">
</div>
</header>

<div class="container" id="productos"></div>

<div class="modal" id="modal" onclick="cerrarModal()">
<img id="imgModal">
</div>

<a class="whatsapp" href="https://wa.me/573027511479?text=Hola quiero información" target="_blank">💬</a>

<script>

let productosGlobal=[];

fetch("https://tienda-crochet-dtlk.onrender.com/productos")
.then(res=>res.json())
.then(data=>{
    productosGlobal=data;
    mostrar(data);
    document.getElementById("loader").classList.add("hidden");
});

function mostrar(data){
    const contenedor=document.getElementById("productos");
    contenedor.innerHTML="";

    if(data.length===0){
        contenedor.innerHTML="<h2 style='text-align:center'>No hay productos disponibles</h2>";
        return;
    }

    data.forEach(p=>{
        contenedor.innerHTML+=`
        <div class="card">
            <div class="img-container">
            <img src="${p.imagen}" onclick="verImagen('${p.imagen}')">
            </div>

            <div class="card-content">
                <h3>${p.nombre}</h3>
                <div class="price">$${p.precio}</div>

                <div class="info">
${
    p.cantidad > 0 
    ? `📦 ${p.cantidad} disponibles | 🚚 Entrega rápida`
    : `❌ Agotado`
}
</div>

                <a class="btn" 
                href="https://wa.me/573146679536?text=Hola quiero el producto: ${p.nombre} con precio ${p.precio}" 
                target="_blank">
                    Comprar por WhatsApp
                </a>

            </div>
        </div>`;
    });
}

buscador.addEventListener("input",()=>{
    const v=buscador.value.toLowerCase();
    mostrar(productosGlobal.filter(p=>p.nombre.toLowerCase().includes(v)));
});

function verImagen(img){
    modal.style.display="flex";
    imgModal.src=img;
}

function cerrarModal(){
    modal.style.display="none";
}

</script>

</body>
</html>
